<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Gestiones Lamda</title>
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .admin-access {
      position: absolute;
      top: 20px;
      right: 30px;
    }

    .admin-access a {
      font-size: 0.9em;
      text-decoration: none;
      color: var(--primary-color);
      background-color: transparent;
      border: 1px solid var(--primary-color);
      padding: 6px 12px;
      border-radius: 6px;
      transition: background-color 0.3s ease;
    }

    .admin-access a:hover {
      background-color: var(--primary-color);
      color: white;
    }

    /* Indicador de Entorno */
    .environment-indicator {
      position: fixed;
      top: 10px;
      left: 10px;
      padding: 10px 20px;
      border-radius: 8px;
      font-weight: bold;
      font-size: 0.9em;
      z-index: 9999;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
      display: none;
      animation: slideIn 0.3s ease-out;
    }

    @keyframes slideIn {
      from {
        transform: translateX(-100%);
        opacity: 0;
      }
      to {
        transform: translateX(0);
        opacity: 1;
      }
    }

    .environment-indicator.test {
      background: linear-gradient(135deg, #ff6b6b 0%, #ff8e53 100%);
      color: white;
      border: 2px solid #ff4757;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .environment-indicator.production {
      background-color: #f8f9fa;
      color: #28a745;
      border: 1px solid #28a745;
      padding: 6px 12px;
      font-size: 0.8em;
    }

    .environment-indicator .pulse {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background-color: currentColor;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% {
        opacity: 1;
      }
      50% {
        opacity: 0.5;
      }
    }

    .environment-indicator .icon {
      font-size: 1.2em;
    }
  </style>
</head>
<body>
  <!-- Indicador de Entorno -->
  <div id="environment-indicator" class="environment-indicator">
    <span class="icon"></span>
    <span class="text"></span>
    <span class="pulse"></span>
  </div>

  <div class="container">
    <header style="position: relative;">
      <h1>Gestiones Lamda</h1>
      <!-- 🔐 Acceso discreto al panel de administración -->
      <div class="admin-access">
        <button onclick="abrirModalLogin()" class="admin-button">👤 Administración</button>
      </div>
    </header>

    <!-- Modal de Login -->
    <div id="modal-login" class="modal">
      <div class="modal-content">
        <div class="modal-header">
          <h2>Acceso Administrativo</h2>
          <button type="button" class="modal-close" onclick="cerrarModalLogin()">&times;</button>
        </div>
        
        <form id="form-login" onsubmit="return autenticar(event)">
          <div class="form-group">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" required>
          </div>

          <div class="form-group">
            <label for="contraseña">Contraseña:</label>
            <input type="password" id="contraseña" required>
          </div>

          <div id="mensaje-error" class="mensaje-error"></div>

          <div class="modal-footer">
            <button type="button" class="btn-cancelar" onclick="cerrarModalLogin()">Cancelar</button>
            <button type="submit" class="btn-acceder">Acceder</button>
          </div>
        </form>
      </div>
    </div>

        <nav class="main-menu">
      <!-- NIVEL 1 -->
      <a href="/api/produccion/produccion.html" class="menu-button menu-tier-1">
        <span class="icon">🏭</span>
        Producción
      </a>
      <a href="/presupuestos" class="menu-button menu-tier-1">
        <span class="icon">🧾</span>
        Presupuestos
      </a>
      
      <!-- NIVEL 2 -->
      <a href="/api/logistica/logistica.html" class="menu-button menu-tier-2">
        <span class="icon">🚚</span>
        Logística y Reparto
      </a>
      <a href="/api/facturacion/facturacion.html" class="menu-button menu-tier-2">
        <span class="icon">💰</span>
        Facturación
      </a>
      
      <!-- NIVEL 3 -->
      <a href="pages/impresion.html" class="menu-button menu-tier-3">
        <span class="icon">🏷️</span>
        Impresión de etiquetas
      </a>
      <a href="javascript:void(0)" onclick="window.iniciarTrasladoGlobal()" class="menu-button menu-tier-3 warning">
        <span class="icon">🏥</span>
        Enviar a Mantenimiento
      </a>
    </nav>

    <main>
      <div class="welcome-section">
        <h2>Bienvenido al sistema de gestión</h2>
        <p>Seleccione una opción del menú para comenzar.</p>
      </div>
    </main>

    <footer>
      <p>&copy; 2024 Gestiones Lamda</p>
    </footer>
  </div>

  <script src="js/main.js"></script>

<!-- CDN SweetAlert2 -->
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
window.iniciarTrasladoGlobal = async function() {
    const { value: tipoMovimiento } = await Swal.fire({
        title: 'Enviar a Cuarentena Global',
        text: '¿Qué tipo de mercadería reportará?',
        icon: 'question',
        showCancelButton: true,
        confirmButtonText: '📦 Artículo / Paquete',
        cancelButtonText: '⚖️ Ingrediente a Granel',
        customClass: {
            confirmButton: 'swal2-confirm swal2-styled',
            cancelButton: 'swal2-cancel swal2-styled'
        }
    });

    let isArticulo = null;
    if (tipoMovimiento === true) isArticulo = true;
    else if (tipoMovimiento === undefined) return;
    else isArticulo = false;

    const titleText = isArticulo ? 'Escanear / Buscar Artículo' : 'Escanear / Buscar Ingrediente';
    const inputPlaceholder = isArticulo ? 'Código o Nombre del Artículo...' : 'Código o Nombre del Ingrediente...';
    
    const { value: paramBusqueda } = await Swal.fire({
        title: titleText,
        input: 'text',
        inputLabel: 'Use el lector de código de barras o escriba',
        inputPlaceholder: inputPlaceholder,
        showCancelButton: true,
        confirmButtonText: 'Buscar',
        didOpen: () => {
            setTimeout(() => Swal.getInput().focus(), 100);
            Swal.getInput().addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    Swal.clickConfirm();
                }
            });
        },
        inputValidator: (value) => {
            if (!value) return 'El campo de búsqueda no puede estar vacío.';
        }
    });

    if (!paramBusqueda) return;

    try {
        Swal.showLoading();
        const endpointBusqueda = isArticulo 
                ? '/api/produccion/articulos' 
                : '/api/produccion/ingredientes';
                
        const resList = await fetch(endpointBusqueda);
        const list = await resList.json();
        
        const dataArr = list.data || list; 
        
        let coincidencias = [];
        if(isArticulo){
             coincidencias = dataArr.filter(i => 
                i.numero.toString() === paramBusqueda.trim() || 
                (i.codigo_barras && i.codigo_barras === paramBusqueda.trim()) || 
                i.nombre.toLowerCase().includes(paramBusqueda.toLowerCase())
            );
        } else {
             coincidencias = dataArr.filter(i => 
                i.codigo.toString() === paramBusqueda.trim() || 
                i.nombre.toLowerCase().includes(paramBusqueda.toLowerCase())
            );
        }

        if (coincidencias.length === 0) {
            return Swal.fire('Sin resultados', 'No se encontró nada coincidente con: ' + paramBusqueda, 'info');
        }

        const itemEncontrado = coincidencias[0];
        const idTransaccion = isArticulo ? itemEncontrado.numero : itemEncontrado.id;
        const nombreDisplay = isArticulo ? itemEncontrado.nombre : itemEncontrado.nombre;

        const htmlCuerpo = isArticulo 
            ? '<input id="g-cant" type="number" step="1" min="1" value="1" class="swal2-input" placeholder="Cantidad">'
            : '<input id="g-cant" type="number" step="0.001" min="0.001" value="" class="swal2-input" placeholder="Cantidad (Kg)">';

        const { value: trasladoData } = await Swal.fire({
            title: 'Confirmar Traslado 🏥',
            html:
                '<p>Item: <b>' + nombreDisplay + '</b></p>' +
                htmlCuerpo +
                '<input id="g-motivo" type="text" class="swal2-input" placeholder="Obligatorio: Motivo del daño...">',
            focusConfirm: false,
            showCancelButton: true,
            confirmButtonText: 'Confirmar Envío al Almacén',
            didOpen: () => {
                const cant = document.getElementById('g-cant');
                if(isArticulo) cant.select(); else cant.focus();
                
                 document.getElementById('g-motivo').addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') Swal.clickConfirm();
                });
            },
            preConfirm: () => {
                const c = document.getElementById('g-cant').value;
                const m = document.getElementById('g-motivo').value;
                if (!c || c <= 0) { Swal.showValidationMessage('Requiere cantidad válida.'); return false; }
                if (!m) { Swal.showValidationMessage('Requiere motivo.'); return false; }
                return { c, m };
            }
        });

        if (!trasladoData) return;

        const urlTraslado = isArticulo 
            ? '/api/produccion/mantenimiento/traslado-ventas' 
            : '/api/produccion/mantenimiento/traslado-ingredientes';
            
        const payloadParams = isArticulo 
            ? { articulo: idTransaccion, cantidad: parseFloat(trasladoData.c), motivo: trasladoData.m }
            : { ingrediente_id: idTransaccion, cantidad: parseFloat(trasladoData.c), motivo: trasladoData.m };

        const trx = await fetch(urlTraslado, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payloadParams)
        });
        
        const trxInfo = await trx.json();
        
        if (trxInfo.success) {
            Swal.fire('¡Aislado!', 'El producto fue dado de baja y enviado a cuarentena.', 'success');
        } else {
            Swal.fire('Error interno', trxInfo.error || 'No se pudo mover la mercadería', 'error');
        }

    } catch (e) {
        Swal.fire('Error de Conexión', e.message, 'error');
    }
};
</script>
</body>
</html>
