<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visualización de Factura - LAMDA</title>
    <!-- Google Fonts Inter & Outfit -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- SweetAlert2 para alertas modernas -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <!-- Librerías CDN para QR y Códigos de Barras AFIP -->
    <script src="https://cdn.jsdelivr.net/npm/qrcode@1.5.1/build/qrcode.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script>
    <style>
        :root {
            --primary-color: #8e4785; /* Violeta institucional */
            --primary-hover: #753b6d;
            --text-dark: #1e293b;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --border-color: #cbd5e1;
            --font-main: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --font-title: 'Outfit', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: var(--font-main);
            background-color: #f1f5f9;
            color: var(--text-dark);
            min-height: 100vh;
            padding: 10px 5px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 850px;
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05), 0 8px 10px -6px rgba(0, 0, 0, 0.05);
            overflow: hidden;
            border: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
        }

        .invoice-sheet {
            padding: 12px 20px; /* Reducido verticalmente para compactar el diseño */
            background: white;
        }

        /* Cabecera de la factura en tres columnas (AFIP) */
        .invoice-header {
            display: grid;
            grid-template-columns: 1.3fr auto 1.1fr;
            gap: 10px;
            margin-bottom: 4px; /* Reducido para compactar */
            align-items: start;
        }

        .company-info {
            font-size: 10px;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .company-logo {
            height: 32px; /* Reducido de 44px para ahorrar espacio vertical */
            width: auto;
            margin-bottom: 2px;
            object-fit: contain;
            display: block;
        }

        /* Recuadro de Letra AFIP */
        .letter-box-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 8px;
            position: relative;
        }

        .letter-box {
            width: 28px;
            height: 28px;
            background-color: var(--primary-color);
            color: white;
            font-family: var(--font-title);
            font-size: 16px;
            font-weight: 800;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            box-shadow: 0 2px 6px rgba(142, 71, 133, 0.15);
        }

        .letter-code {
            font-size: 7px;
            font-weight: 800;
            color: var(--primary-color);
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Línea divisoria vertical */
        .vertical-divider {
            width: 1px;
            background-color: #e2e8f0;
            height: 55px; /* Reducido de 75px */
            position: absolute;
            top: 38px;
            left: 50%;
            transform: translateX(-50%);
        }

        .invoice-info {
            text-align: right;
            font-size: 10px;
            color: var(--text-dark);
            line-height: 1.3;
        }

        .invoice-title {
            font-family: var(--font-title);
            font-size: 13.5px; /* Reducido */
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 1px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 6px;
        }

        .invoice-number {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 2px;
        }

        .header-divider {
            border-bottom: 2px solid var(--primary-color);
            margin-bottom: 6px; /* Reducido de 12px */
        }

        .loading {
            text-align: center;
            padding: 60px 20px;
            color: var(--primary-color);
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid var(--primary-color);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error {
            background: #fee2e2;
            border: 1px solid #fca5a5;
            border-radius: 8px;
            padding: 20px;
            margin: 30px;
            color: #991b1b;
            font-weight: 500;
            font-size: 14px;
        }

        /* Insignias de Estado */
        .badge {
            display: inline-block;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 9px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge.borrador {
            background: #fffbeb;
            color: #d97706;
            border: 1px solid #fde68a;
        }

        .badge.aprobada {
            background: #ecfdf5;
            color: #059669;
            border: 1px solid #a7f3d0;
        }

        .badge.aprobada_local {
            background: #ecfeff;
            color: #0891b2;
            border: 1px solid #a5f3fc;
        }

        .badge.rechazada {
            background: #fdf2f2;
            color: #dc2626;
            border: 1px solid #fde8e8;
        }

        .badge.anulada {
            background: #f1f5f9;
            color: #475569;
            border: 1px solid #cbd5e1;
        }

        /* Panel del Cliente */
        .client-panel {
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            border-left: 3px solid var(--primary-color);
            border-radius: 4px;
            padding: 4px 10px; /* Reducido */
            margin-bottom: 6px; /* Reducido */
        }

        .panel-title {
            font-size: 9px;
            font-weight: 800;
            color: var(--primary-color);
            margin-bottom: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .client-grid {
            display: grid;
            grid-template-columns: 1.15fr 0.85fr;
            gap: 3px 15px; /* Reducido */
            font-size: 10px;
        }

        .client-field {
            line-height: 1.3;
        }

        .field-label {
            font-weight: 500;
            color: var(--text-muted);
            margin-right: 5px;
        }

        .field-value {
            font-weight: 600;
            color: var(--text-dark);
        }

        /* Tabla de Productos */
        .items-table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 6px; /* Reducido */
            font-size: 10px;
        }

        .items-table th {
            background-color: var(--primary-color);
            color: white;
            padding: 3px 6px;
            font-weight: 600;
            text-align: left;
        }

        .items-table td {
            padding: 3px 6px; /* Reducido a 3px vertical para compactar como sándwich */
            border-bottom: 1px solid #f1f5f9;
            color: var(--text-dark);
            vertical-align: middle;
        }

        .items-table tr:nth-child(even) td {
            background-color: #fafafa;
        }

        .items-table .text-right {
            text-align: right;
        }

        /* Sección de Totales */
        .totals-section {
            display: flex;
            justify-content: flex-end;
            margin-bottom: 6px;
        }

        .totals-table {
            width: 240px;
            border-collapse: collapse;
            font-size: 10px;
            background-color: var(--bg-light);
            border: 1px solid var(--border-color);
            border-radius: 4px;
        }

        .totals-table td {
            padding: 2px 8px; /* Reducido */
            border-bottom: 1px solid #f1f5f9;
        }

        .totals-table tr:last-child td {
            border-bottom: none;
        }

        .totals-label {
            color: var(--text-muted);
            font-weight: 500;
        }

        .totals-val {
            text-align: right;
            font-weight: 600;
            color: var(--text-dark);
        }

        .totals-val.total-val {
            color: var(--primary-color);
            font-size: 13px;
            font-weight: 800;
        }

        /* Bloque AFIP CAE + QR + Barcode */
        .cae-section {
            border: 1.5px solid var(--primary-color);
            border-radius: 6px;
            padding: 5px 10px; /* Reducido */
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            margin-top: 6px;
            background-color: #fffafb;
        }

        .cae-graphics {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .qr-image {
            width: 85px;
            height: 85px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
            background: white;
            display: block;
        }

        .barcode-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: white;
            padding: 3px 6px;
            border: 1px solid #e2e8f0;
            border-radius: 4px;
        }

        .barcode-image {
            max-height: 28px;
            width: auto;
            display: block;
        }

        /* Ocultar elementos sin contenido cargado */
        .qr-image:not([src]), .barcode-image:not([src]), .barcode-container:not(.active) {
            display: none !important;
        }

        .cae-details {
            flex: 1;
            font-size: 10px;
            text-align: right;
            display: flex;
            flex-direction: column;
            align-items: flex-end;
            gap: 1px;
        }

        .cae-title {
            font-size: 7.5px;
            font-weight: 800;
            color: var(--primary-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .cae-value {
            font-size: 11px;
            font-weight: 700;
            color: var(--text-dark);
            letter-spacing: 0.5px;
        }

        .cae-vto {
            color: var(--text-muted);
            font-size: 9.5px;
        }

        .cae-badge-official {
            font-size: 7.5px;
            font-weight: 800;
            color: #059669;
            border: 1.5px solid #a7f3d0;
            background-color: #ecfdf5;
            padding: 1px 5px;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 2px;
            display: inline-block;
        }

        /* Datos bancarios */
        .bank-details-box {
            border-top: 1px dashed var(--border-color);
            padding-top: 4px; /* Reducido */
            margin-top: 6px; /* Reducido */
            font-size: 9.5px;
            color: var(--text-muted);
            line-height: 1.35;
        }

        .bank-title {
            font-weight: 700;
            color: var(--primary-color);
            margin-bottom: 2px;
            text-transform: uppercase;
            font-size: 8.5px;
            letter-spacing: 0.5px;
        }

        /* Barra de Acciones */
        .actions {
            display: flex;
            gap: 12px;
            justify-content: center;
            padding: 12px 20px;
            background: #f8fafc;
            border-top: 1px solid var(--border-color);
        }

        .btn {
            padding: 8px 18px;
            border: 1px solid transparent;
            border-radius: 6px;
            font-family: var(--font-main);
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
        }

        .btn-primary {
            background-color: var(--primary-color);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: white;
            border-color: #cbd5e1;
            color: #475569;
        }

        .btn-secondary:hover {
            background-color: #f1f5f9;
            color: #1e293b;
        }

        .btn-success {
            background-color: #10b981;
            color: white;
        }

        .btn-success:hover {
            background-color: #059669;
            transform: translateY(-1px);
        }

        .btn-warning {
            background-color: #f59e0b;
            color: white;
        }

        .btn-warning:hover {
            background-color: #d97706;
            transform: translateY(-1px);
        }

        /* Optimizaciones para Impresión */
        @media print {
            body {
                background: white !important;
                padding: 0 !important;
                display: block !important;
                min-height: auto !important;
            }

            .container {
                box-shadow: none !important;
                border: none !important;
                padding: 0 !important;
                max-width: 100% !important;
            }

            .invoice-sheet {
                padding: 0 !important;
            }

            .actions {
                display: none !important;
            }

            /* Quitar el cartel redundante de aprobado/borrador en impresión */
            .badge {
                display: none !important;
            }

            /* Forzar visualización de imágenes con src cargados en impresión */
            .qr-image[src], .barcode-image[src] {
                display: block !important;
            }
            
            .barcode-container.active {
                display: flex !important;
            }

            /* Ocultar ID interno y bloque de control interno en impresión */
            .internal-control-id, .internal-control-block {
                display: none !important;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div id="loading" class="loading">
            <div class="loading-spinner"></div>
            <p>Cargando factura...</p>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div id="content" class="invoice-sheet" style="display: none;">
            <!-- El contenido se cargará dinámicamente -->
        </div>

        <div class="actions" id="actions">
            <button class="btn btn-secondary" onclick="window.close()">❌ Cerrar</button>
            <button class="btn btn-success" id="btn-obtener-cae" onclick="obtenerCAE()" style="display: none;">
                📄 Obtener CAE de ARCA
            </button>
            <button class="btn btn-success" onclick="descargarPDF()">📄 Descargar PDF</button>
            <button class="btn btn-primary" id="btn-whatsapp" onclick="enviarPorWhatsApp()" style="background-color: #10b981; border-color: #059669; display: none; color: white;">
                🟢 Enviar por WhatsApp
            </button>
            <button class="btn btn-primary" onclick="window.print()">🖨️ Imprimir Factura</button>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const facturaId = urlParams.get('id');
        const presupuestoId = urlParams.get('presupuesto_id');
        const numeroFactura = urlParams.get('numero_factura') || 'Factura Histórica';

        // Constante para la URL base de la API
        const API_URL = 'http://localhost:3004/facturacion';

        let companyConfig = null;
        let currentFactura = null;

        // Inicializar el flujo de carga
        inicializar();

        async function inicializar() {
            try {
                // Cargar datos de la empresa desde el servidor
                const res = await fetch(`${API_URL}/company-config`);
                const result = await res.json();
                if (result.success && result.data) {
                    companyConfig = result.data;
                    console.log('✅ Configuración de empresa obtenida:', companyConfig);
                }
            } catch (err) {
                console.warn('⚠️ No se pudo obtener la configuración corporativa:', err.message);
            }

            if (!facturaId && !presupuestoId) {
                mostrarError('No se especificó el ID de la factura o del presupuesto');
            } else if (facturaId) {
                cargarFactura(facturaId);
            } else if (presupuestoId) {
                cargarFacturaHeredada(presupuestoId, numeroFactura);
            }
        }

        async function cargarFacturaHeredada(pId, numFact) {
            try {
                console.log('🔍 Cargando factura heredada (presupuesto ID):', pId);

                const response = await fetch(`${API_URL}/facturas/heredadas/${pId}`);
                const result = await response.json().catch(() => null);

                if (!response.ok) {
                    const errorMsg = result ? (result.message || result.error) : response.statusText;
                    throw new Error(`Error ${response.status}: ${errorMsg}`);
                }

                console.log('✅ Factura heredada cargada:', result);

                if (result && result.success && result.data) {
                    if (numFact) {
                        result.data.descripcion_lomasoft = numFact;
                    }
                    renderizarFactura(result.data);
                } else {
                    throw new Error(result.message || 'Error al cargar la factura heredada');
                }

            } catch (error) {
                console.error('❌ Error:', error);
                mostrarError(error.message);
            }
        }

        async function cargarFactura(id) {
            try {
                console.log('🔍 Cargando factura ID:', id);

                const response = await fetch(`${API_URL}/facturas/${id}`);
                const result = await response.json().catch(() => null);

                if (!response.ok) {
                    const errorMsg = result ? (result.message || result.error) : response.statusText;
                    throw new Error(`Error ${response.status}: ${errorMsg}`);
                }

                console.log('✅ Factura cargada:', result);

                if (result && result.success && result.data) {
                    renderizarFactura(result.data);
                } else {
                    throw new Error(result.message || 'Error al cargar la factura');
                }

            } catch (error) {
                console.error('❌ Error:', error);
                mostrarError(error.message);
            }
        }

        function renderizarFactura(factura) {
            currentFactura = factura;
            document.getElementById('loading').style.display = 'none';
            document.getElementById('content').style.display = 'block';

            let badgeClass = 'borrador';
            if (factura.estado === 'APROBADA') {
                badgeClass = 'aprobada';
            } else if (factura.estado === 'APROBADA_LOCAL') {
                badgeClass = 'aprobada_local';
            } else if (factura.estado === 'RECHAZADA') {
                badgeClass = 'rechazada';
            } else if (factura.estado === 'ANULADA') {
                badgeClass = 'anulada';
            }

            const formatMoney = (num) => {
                return new Intl.NumberFormat('es-AR', {
                    style: 'currency',
                    currency: 'ARS'
                }).format(num || 0);
            };

            const tiposComprobante = {
                1: 'Factura A',
                6: 'Factura B',
                11: 'Factura C',
                2: 'Nota de Débito A',
                3: 'Nota de Crédito A',
                7: 'Nota de Débito B',
                8: 'Nota de Crédito B',
                12: 'Nota de Débito C',
                13: 'Nota de Crédito C'
            };

            const ptoVtaInt = parseInt(factura.pto_vta || 0, 10);
            const esTipoE = [19, 20, 21].includes(parseInt(factura.tipo_cbte || 0, 10));
            // No discriminar IVA si es puesto 2, puesto 90 o tipo E, pero SIEMPRE discriminar si es puesto 1
            const noDiscriminaIva = (ptoVtaInt === 2 || ptoVtaInt === 90 || esTipoE) && ptoVtaInt !== 1;
            const isPuesto90 = ptoVtaInt === 90;
            
            let tipoComprobante = tiposComprobante[factura.tipo_cbte] || `Tipo ${factura.tipo_cbte}`;
            if (isPuesto90) {
                const esNC = [3, 8, 13].includes(parseInt(factura.tipo_cbte));
                tipoComprobante = esNC ? 'Remito Entrega (NC)' : 'Presupuesto Aprobado';
            }

            const obtenerLetra = (tipo) => {
                const t = parseInt(tipo);
                if ([1, 2, 3].includes(t)) return 'A';
                if ([6, 7, 8].includes(t)) return 'B';
                if ([11, 12, 13].includes(t)) return 'C';
                return 'X';
            };

            let letra = factura.es_heredada ? 'X' : (isPuesto90 ? 'R' : obtenerLetra(factura.tipo_cbte));
            let codigoCbteText = factura.es_heredada ? 'DOC. DE CONTROL' : (isPuesto90 ? 'DOC. INTERNO' : `COD. ${String(factura.tipo_cbte).padStart(3, '0')}`);

            if (factura.es_heredada && numeroFactura) {
                const numStr = String(numeroFactura).toUpperCase();
                if (numStr.includes('-0007-')) {
                    if (numStr.includes('A-')) {
                        letra = 'A';
                        codigoCbteText = numStr.includes('NC') ? 'COD. 003' : (numStr.includes('ND') ? 'COD. 002' : 'COD. 001');
                    } else if (numStr.includes('B-')) {
                        letra = 'B';
                        codigoCbteText = numStr.includes('NC') ? 'COD. 008' : (numStr.includes('ND') ? 'COD. 007' : 'COD. 006');
                    }
                }
            }
            const numFactura = formatNumeroFactura(factura);

            // Cargar datos de emisor desde la configuración del servidor, o usar valores por defecto (con el celular 221-6615746)
            const address = companyConfig ? companyConfig.address : 'Av. 19 Nº 406';
            const cuitFmt = companyConfig ? companyConfig.cuitFmt : '23-24892174-9';
            const email = companyConfig ? companyConfig.email : '';
            const phone = companyConfig && companyConfig.phone ? companyConfig.phone : '221-6615746';
            const bankName = companyConfig ? companyConfig.bank : 'Banco Galicia';
            const bankDU = companyConfig ? companyConfig.du : '24892174';
            const bankAccount = companyConfig ? companyConfig.account : '4007844-1 373-4';
            const bankCbu = companyConfig ? companyConfig.cbuFmt : '00703732 30004007 844141';
            const bankAlias = companyConfig ? companyConfig.alias : 'LAMDA.SER.MARTIN';
            const inicioActividad = companyConfig && companyConfig.inicioActividad ? companyConfig.inicioActividad : '01/01/2026';

            // Generar HTML de la hoja de factura
            // Nota: Se fusionó CUIT e Ingresos Brutos en un renglón, y se colocó el estado badge inline con el título
            let html = `
                <!-- Cabecera de la Factura -->
                <div class="invoice-header">
                    <div class="company-info">
                        <img src="../img/logo_LAMDA_grande.png" class="company-logo" alt="LAMDA Logo" onerror="this.src='../img/logo_LAMDA.png'; this.onerror=null;">
                        <div>Dirección: ${address}</div>
                        <div>Condición IVA: Responsable Inscripto</div>
                        <div>Tel / WA: ${phone}${email ? ` | Email: ${email}` : ''}</div>
                    </div>
                    
                    <div class="letter-box-container">
                        <div class="letter-box">${letra}</div>
                        <div class="letter-code">${codigoCbteText}</div>
                        <div class="vertical-divider"></div>
                    </div>
                    
                    <div class="invoice-info">
                        <div class="invoice-title">
                            ${tipoComprobante}

        async function obtenerCAE() {
            if (!confirm('¿Emitir esta factura a ARCA para obtener CAE?')) {
                return;
            }

            const btn = document.getElementById('btn-obtener-cae');
            const originalText = btn.innerHTML;
            btn.disabled = true;
            btn.innerHTML = '⏳ Emitiendo a ARCA...';

            try {
                console.log('📤 Emitiendo factura a AFIP, ID:', facturaId);

                const response = await fetch(`${API_URL}/facturas/${facturaId}/emitir`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });

                const result = await response.json();

                if (result.success) {
                    alert('✅ CAE obtenido exitosamente: ' + result.data.cae);
                    console.log('✅ CAE obtenido:', result.data);
                    window.location.reload();
                } else {
                    throw new Error(result.detalle || result.message || 'Error al obtener CAE');
                }

            } catch (error) {
                console.error('❌ Error emitiendo factura:', error.message);

                if (error.message.includes('AFIP exige DNI') || error.message.includes('344')) {
                    const { value: dni } = await Swal.fire({
                        title: 'Ingrese DNI del Cliente',
                        text: 'ARCA exige un DNI para ventas a Consumidor Final superiores a $344.000 ARS',
                        input: 'text',
                        icon: 'warning',
                        inputPlaceholder: 'Ej: 30123456',
                        showCancelButton: true,
                        confirmButtonText: 'Guardar y Reintentar',
                        cancelButtonText: 'Cancelar',
                        inputValidator: (value) => {
                            if (!value) return 'El DNI es obligatorio';
                            if (!/^\d{7,8}$/.test(value.trim())) return 'Ingrese un DNI válido (7 u 8 números)';
                        }
                    });

                    if (dni) {
                        try {
                            btn.innerHTML = '⏳ Guardando DNI...';
                            const putRes = await fetch(`${API_URL}/facturas/${facturaId}`, {
                                method: 'PUT',
                                headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({ doc_tipo: 96, doc_nro: dni.trim() })
                            });

                            if (putRes.ok) {
                                btn.innerHTML = '🔄 Reintentando Emisión...';
                                return obtenerCAE(); // Llamada recursiva tras corregir el DNI
                            } else {
                                throw new Error('No se pudo guardar el DNI en la base de datos');
                            }
                        } catch (putErr) {
                            alert('Error guardando DNI: ' + putErr.message);
                        }
                    }
                } else {
                    alert('Error al obtener CAE de ARCA:\n\n' + error.message);
                }

                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function formatNumeroFactura(factura) {
            if (factura.descripcion_lomasoft) {
                return factura.descripcion_lomasoft.replace(/^Fac\s+/, '');
            }
            if (factura.cbte_nro) {
                const ptoVta = String(factura.pto_vta || 0).padStart(5, '0');
                const numero = String(factura.cbte_nro).padStart(8, '0');
                return `${ptoVta} - ${numero}`;
            } else if (factura.nro_interno) {
                const serie = factura.serie_interna || 'INT';
                const numero = String(factura.nro_interno).padStart(8, '0');
                return `${serie} - ${numero}`;
            } else {
                return 'Sin número asignado';
            }
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            if (dateStr.length === 8 && !dateStr.includes('-')) {
                const year = dateStr.substring(0, 4);
                const month = dateStr.substring(4, 6);
                const day = dateStr.substring(6, 8);
                return `${day}/${month}/${year}`;
            }
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('es-AR');
        }

        function obtenerCondicionIVA(id) {
            const condiciones = {
                1: 'Responsable Inscripto',
                2: 'Responsable no Inscripto',
                4: 'Exento',
                5: 'Consumidor Final',
                6: 'Responsable Monotributo'
            };
            return condiciones[id] || `Condición ${id}`;
        }

        function normalizarCodigoIVA(id) {
            const normalizacion = {
                1: 5,  // 21%
                2: 4   // 10.5%
            };
            return normalizacion[id] || id;
        }

        function obtenerAlicuotaIVA(id) {
            const codigoNormalizado = normalizarCodigoIVA(id);

            const alicuotas = {
                3: '0%',
                4: '10,5%',
                5: '21%',
                6: '27%',
                8: '5%',
                9: '2,5%'
            };
            return alicuotas[codigoNormalizado] || `${codigoNormalizado}%`;
        }

        async function descargarPDF() {
            try {
                let downloadUrl = `${API_URL}/facturas/${facturaId}/pdf`;
                let filename = `factura-${facturaId}.pdf`;
                
                if (presupuestoId) {
                    downloadUrl = `${API_URL}/facturas/heredadas/${presupuestoId}/pdf?numero_factura=${encodeURIComponent(numeroFactura)}`;
                    filename = `factura-${numeroFactura.replace(/\s+/g, '_')}.pdf`;
                }

                console.log('📄 Descargando PDF desde:', downloadUrl);

                const response = await fetch(downloadUrl, {
                    method: 'POST'
                });

                if (!response.ok) {
                    throw new Error(`Error ${response.status}: ${response.statusText}`);
                }

                // Descargar el PDF
                const blob = await response.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = filename;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);

                console.log('✅ PDF descargado exitosamente');
            } catch (error) {
                console.error('❌ Error descargando PDF:', error);
                alert('Error al descargar el PDF: ' + error.message);
            }
        }

        async function enviarPorWhatsApp() {
            if (!currentFactura) {
                Swal.fire({
                    title: 'Error',
                    text: 'No se han cargado los datos de la factura.',
                    icon: 'error'
                });
                return;
            }

            const raw = (currentFactura.whatsapp_facturas || '').trim();
            if (!raw) {
                Swal.fire({
                    title: 'Sin números',
                    text: 'Esta factura no tiene números de WhatsApp configurados.',
                    icon: 'warning'
                });
                return;
            }

            let contacts = [];
            if (raw.startsWith('[')) {
                try {
                    contacts = JSON.parse(raw);
                } catch(e) {}
            }
            if (!Array.isArray(contacts) || contacts.length === 0) {
                // Soporte para formato legado (separado por comas)
                contacts = raw.split(',').map(num => ({
                    numero: num.trim(),
                    nombre: '',
                    cargo: ''
                })).filter(c => c.numero);
            }

            const hasTypeDefault = contacts.some(c => c.default_factura === true);
            const hasGeneralDefault = !hasTypeDefault && contacts.some(c => c.default === true);

            let htmlContent = `
                <div style="text-align: left; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
                    <p style="margin-bottom: 12px; font-size: 14px; color: #4b5563; font-weight: 500;">
                        Seleccione los destinatarios para enviar la factura:
                    </p>
                    <div style="display: flex; flex-direction: column; gap: 8px; max-height: 250px; overflow-y: auto; padding: 4px;">
            `;

            contacts.forEach((c, index) => {
                const isChecked = hasTypeDefault ? (c.default_factura === true) : (hasGeneralDefault ? (c.default === true) : true);
                const formattedNum = c.numero.replace(/\D/g, '');
                let displayNum = c.numero;
                if (formattedNum.length === 10) {
                    displayNum = `(${formattedNum.substring(0,3)}) ${formattedNum.substring(3,6)}-${formattedNum.substring(6,10)}`;
                } else if (formattedNum.length === 13 && formattedNum.startsWith('549')) {
                    displayNum = `+54 9 (${formattedNum.substring(3,6)}) ${formattedNum.substring(6,9)}-${formattedNum.substring(9,13)}`;
                } else if (formattedNum.length === 11 && formattedNum.startsWith('54')) {
                    displayNum = `+54 (${formattedNum.substring(2,5)}) ${formattedNum.substring(5,8)}-${formattedNum.substring(8,11)}`;
                }
                
                const labelText = c.nombre 
                    ? `<strong>${c.nombre}</strong>${c.cargo ? ` <span style="font-size: 10px; background: #e0f2fe; color: #0369a1; padding: 1px 6px; border-radius: 4px; font-weight: 600; text-transform: uppercase; margin-left: 6px;">${c.cargo}</span>` : ''}`
                    : `Contacto #${index + 1}`;

                htmlContent += `
                    <label style="display: flex; align-items: flex-start; gap: 12px; padding: 10px; border: 1px solid #e5e7eb; border-radius: 6px; background: #f9fafb; cursor: pointer; transition: background 0.2s; margin-bottom: 0;">
                        <input type="checkbox" class="swal-contact-chk" value="${c.numero}" ${isChecked ? 'checked' : ''} style="margin-top: 3px; cursor: pointer; width: 16px; height: 16px;">
                        <div style="flex: 1;">
                            <div style="font-size: 13px; color: #1f2937; margin-bottom: 2px;">${labelText}</div>
                            <div style="font-size: 12px; color: #6b7280;">📱 ${displayNum}</div>
                        </div>
                    </label>
                `;
            });

            htmlContent += `
                    </div>
                    <div style="margin-top: 15px; padding-top: 10px; border-top: 1px dashed #cbd5e1;">
                        <label style="display: block; font-size: 13px; font-weight: 600; color: #4b5563; margin-bottom: 4px;">
                            Otro número (opcional):
                        </label>
                        <input type="text" id="swal-custom-phone" placeholder="Ej: 2216615746" style="width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; font-size: 13px; box-sizing: border-box;">
                    </div>
            `;

            if (currentFactura && currentFactura.bunker_cliente_id) {
                htmlContent += `
                    <label style="display: flex; align-items: center; gap: 8px; margin-top: 15px; padding-top: 10px; border-top: 1px dashed #cbd5e1; cursor: pointer; font-size: 13px; color: #475569;">
                        <input type="checkbox" id="swal-save-default" style="width: 16px; height: 16px; cursor: pointer;">
                        <span>Guardar esta selección como contactos predeterminados para facturas</span>
                    </label>
                `;
            }

            htmlContent += `</div>`;

            Swal.fire({
                title: 'Enviar por WhatsApp',
                html: htmlContent,
                icon: 'question',
                showCancelButton: true,
                confirmButtonText: '🟢 Enviar',
                cancelButtonText: 'Cancelar',
                confirmButtonColor: '#10b981',
                cancelButtonColor: '#6b7280',
                preConfirm: () => {
                    const selected = Array.from(document.querySelectorAll('.swal-contact-chk:checked')).map(el => el.value);
                    const customPhone = document.getElementById('swal-custom-phone').value.trim();
                    const saveDefaultCheckbox = document.getElementById('swal-save-default');
                    const saveDefault = saveDefaultCheckbox ? saveDefaultCheckbox.checked : false;

                    if (customPhone) {
                        const cleaned = customPhone.replace(/[^\d,]/g, '');
                        if (cleaned) {
                            cleaned.split(',').forEach(num => {
                                if (num.trim()) selected.push(num.trim());
                            });
                        }
                    }

                    if (selected.length === 0) {
                        Swal.showValidationMessage('Debes seleccionar o ingresar al menos un número.');
                        return false;
                    }

                    return {
                        destinatarios: selected,
                        saveDefault: saveDefault
                    };
                }
            }).then(async (result) => {
                if (!result.isConfirmed) return;

                const modalResult = result.value;

                // Si se marca guardar por defecto, actualizar en base de datos
                if (modalResult.saveDefault && currentFactura && currentFactura.bunker_cliente_id) {
                    try {
                        const updatedContacts = contacts.map(c => {
                            const isSelected = modalResult.destinatarios.includes(c.numero);
                            return {
                                ...c,
                                default_factura: isSelected
                            };
                        });

                        currentFactura.whatsapp_facturas = JSON.stringify(updatedContacts);

                        await fetch(`/api/logistica/bunker/clientes/${currentFactura.bunker_cliente_id}/whatsapp-contacts`, {
                            method: 'PATCH',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ whatsapp_facturas: currentFactura.whatsapp_facturas })
                        });
                        console.log('✅ [WHATSAPP-FRONT] Contactos predeterminados de WhatsApp actualizados (Facturas).');
                    } catch (err) {
                        console.error('❌ [WHATSAPP-FRONT] Error al guardar contactos predeterminados:', err);
                    }
                }

                const destinatariosSeleccionados = modalResult.destinatarios;

                Swal.fire({
                    title: 'Enviando...',
                    text: 'Generando comprobante y enviando mensaje...',
                    allowOutsideClick: false,
                    didOpen: () => {
                        Swal.showLoading();
                    }
                });

                try {
                    const response = await fetch(`${API_URL}/whatsapp/facturas/${facturaId}/enviar`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ destinatarios: destinatariosSeleccionados })
                    });

                    const data = await response.json();

                    if (response.ok && data.success) {
                        Swal.fire({
                            title: '¡Factura Enviada!',
                            text: `Se envió la factura con éxito a: ${data.data.destinatarios}`,
                            icon: 'success',
                            confirmButtonColor: '#10b981'
                        });
                    } else {
                        throw new Error(data.message || data.error || 'Error desconocido al enviar');
                    }
                } catch (err) {
                    console.error('Error enviando por WhatsApp:', err);
                    Swal.fire({
                        title: 'Error al enviar',
                        text: err.message,
                        icon: 'error',
                        confirmButtonColor: '#ef4444'
                    });
                }
            });
        }

        function mostrarError(mensaje) {
            document.getElementById('loading').style.display = 'none';
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = `❌ Error: ${mensaje}`;
            errorDiv.style.display = 'block';
        }
    </script>
