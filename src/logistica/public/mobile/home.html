<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Panel principal del sistema LAMDA - Acceso a módulos de Logística y Ventas">
    <title>Inicio - LAMDA</title>
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/mobile.css">
    <script src="/env-config.js"></script>
    <style>
        /* ==========================================
         * DASHBOARD / HOME — Estilos locales
         * ========================================== */
        .home-page {
            background: linear-gradient(165deg, #0f172a 0%, #1e293b 40%, #334155 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding: 0;
        }

        /* --- Header / Bienvenida --- */
        .home-header {
            padding: 2.5rem 1.5rem 1.5rem;
            color: white;
            text-align: left;
        }

        .home-greeting {
            font-size: 0.875rem;
            font-weight: 500;
            color: #94a3b8;
            margin-bottom: 0.25rem;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .home-username {
            font-size: 1.75rem;
            font-weight: 800;
            color: #f1f5f9;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .home-subtitle {
            font-size: 0.85rem;
            color: #64748b;
            line-height: 1.4;
        }

        .home-logo {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
            display: block;
        }

        /* --- Grid de módulos --- */
        .dashboard-grid {
            flex: 1;
            padding: 0 1.25rem 1.5rem;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .module-card {
            display: flex;
            align-items: center;
            gap: 1.25rem;
            padding: 1.5rem;
            border-radius: 1.25rem;
            text-decoration: none;
            color: white;
            position: relative;
            overflow: hidden;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .module-card:active {
            transform: scale(0.97);
        }

        .module-card--logistica {
            background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
            box-shadow: 0 10px 30px -5px rgba(37, 99, 235, 0.4);
        }

        .module-card--ventas {
            background: linear-gradient(135deg, #059669 0%, #047857 100%);
            box-shadow: 0 10px 30px -5px rgba(5, 150, 105, 0.4);
        }

        /* Efecto de brillo sutíl en la esquina */
        .module-card::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -50%;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            pointer-events: none;
        }

        .module-card-icon {
            font-size: 2.5rem;
            flex-shrink: 0;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 1rem;
            backdrop-filter: blur(4px);
        }

        .module-card-content {
            flex: 1;
            min-width: 0;
        }

        .module-card-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            line-height: 1.2;
        }

        .module-card-desc {
            font-size: 0.8rem;
            opacity: 0.85;
            line-height: 1.3;
        }

        .module-card-arrow {
            font-size: 1.25rem;
            flex-shrink: 0;
            opacity: 0.5;
            transition: opacity 0.2s;
        }

        .module-card:active .module-card-arrow {
            opacity: 1;
        }

        /* --- Footer --- */
        .home-footer {
            padding: 1.5rem;
            text-align: center;
        }

        .btn-logout {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            background: rgba(239, 68, 68, 0.15);
            color: #fca5a5;
            border: 1px solid rgba(239, 68, 68, 0.2);
            border-radius: 0.75rem;
            padding: 0.875rem 2rem;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            -webkit-tap-highlight-color: transparent;
            width: 100%;
            max-width: 280px;
        }

        .btn-logout:active {
            background: rgba(239, 68, 68, 0.3);
            transform: scale(0.97);
        }

        .home-version {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #475569;
        }

        /* --- Animaciones de entrada --- */
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(16px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .animate-in {
            animation: fadeInUp 0.4s ease-out both;
        }

        .animate-in:nth-child(1) { animation-delay: 0.05s; }
        .animate-in:nth-child(2) { animation-delay: 0.15s; }
        .animate-in:nth-child(3) { animation-delay: 0.25s; }

        /* --- Responsive (tablets) --- */
        @media (min-width: 640px) {
            .dashboard-grid {
                max-width: 480px;
                margin: 0 auto;
            }

            .home-header {
                max-width: 480px;
                margin: 0 auto;
            }
        }
    </style>
</head>
<body class="home-page">

    <!-- HEADER / BIENVENIDA -->
    <header class="home-header animate-in">
        <span class="home-logo">🏭</span>
        <p class="home-greeting">Bienvenido al sistema</p>
        <h1 class="home-username" id="home-username">Cargando...</h1>
        <p class="home-subtitle">Seleccioná el módulo con el que querés trabajar.</p>
    </header>

    <!-- GRID DE MÓDULOS -->
    <nav class="dashboard-grid" aria-label="Módulos disponibles">
        <a href="ruta.html" class="module-card module-card--logistica animate-in" id="card-logistica">
            <div class="module-card-icon">🚚</div>
            <div class="module-card-content">
                <div class="module-card-title">Logística</div>
                <div class="module-card-desc">Hoja de ruta, entregas y reparto del día</div>
            </div>
            <span class="module-card-arrow">›</span>
        </a>

        <a href="presupuestos.html" class="module-card module-card--ventas animate-in" id="card-ventas">
            <div class="module-card-icon">💰</div>
            <div class="module-card-content">
                <div class="module-card-title">Ventas / Presupuestos</div>
                <div class="module-card-desc">Cajero móvil, remitos y retiros en la calle</div>
            </div>
            <span class="module-card-arrow">›</span>
        </a>
    </nav>

    <!-- FOOTER -->
    <footer class="home-footer animate-in">
        <button class="btn-logout" onclick="cerrarSesion()" id="btn-cerrar-sesion">
            <span>🚪</span> Cerrar Sesión
        </button>
        <p class="home-version">LAMDA v1.0 — Sistema Integral de Gestión</p>
    </footer>

    <!-- Scripts -->
    <script src="js/mobile.js?v=12"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Verificar sesión — si no hay, redirigir a login
            if (!verificarSesion()) {
                return; // verificarSesion() ya redirige a index.html
            }

            // Hidratar nombre del usuario
            const sesion = obtenerSesion();
            const nombreEl = document.getElementById('home-username');
            if (nombreEl && sesion) {
                nombreEl.textContent = sesion.nombre || sesion.usuario || 'Usuario';
            }
        });
    </script>
</body>
</html>
