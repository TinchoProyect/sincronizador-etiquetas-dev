<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#2563eb">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>Dashboard - Logística LAMDA</title>
    <link rel="icon" type="image/x-icon" href="../../favicon.ico">
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="css/mobile.css">
    <script src="/env-config.js"></script>
</head>
<body class="ruta-page">
    <!-- Header Fijo -->
    <header class="mobile-header">
        <div class="header-top">
            <button class="btn-icon" onclick="cerrarSesion()" title="Cerrar sesión">
                ← Salir
            </button>
            <h1 class="header-title" id="main-title">Mi Ruta</h1>
            <button class="btn-icon" onclick="refrescarTabActual()" title="Refrescar">
                🔄
            </button>
        </div>
        <div class="header-info" id="header-info">
            <div class="chofer-info">
                <span class="icon">👤</span>
                <span id="chofer-nombre">Cargando...</span>
            </div>
            <div class="ruta-info" id="info-ruta-activa">
                <span class="icon">📅</span>
                <span id="ruta-nombre">Cargando ruta...</span>
            </div>
        </div>
        <div class="header-stats" id="header-stats">
            <div class="stat">
                <div class="stat-value" id="total-entregas">0</div>
                <div class="stat-label">Total</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="entregas-completadas">0</div>
                <div class="stat-label">Completadas</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="entregas-pendientes">0</div>
                <div class="stat-label">Pendientes</div>
            </div>
        </div>
    </header>

    <!-- TABS CONTENT -->
    
    <!-- Tab 1: Pedidos Pendientes -->
    <main class="tab-content" id="tab-pendientes">
        <div class="entregas-container" id="pendientes-container">
            <div class="loading-screen">
                <div class="spinner"></div>
                <p>Cargando pedidos pendientes...</p>
            </div>
        </div>
    </main>

    <!-- Tab 2: Ruta Activa (Default) -->
    <main class="tab-content active" id="tab-ruta">
        <div class="entregas-container" id="entregas-container">
            <div class="loading-screen">
                <div class="spinner"></div>
                <p>Cargando tu ruta...</p>
            </div>
        </div>
        
        <!-- Botón Flotante (Solo visible en esta tab, manejado por JS) -->
        <button class="btn-finalizar-ruta" id="btn-finalizar-flotante" onclick="finalizarRutaDelDia()" title="Finalizar reparto del día">
            🏁 Finalizar Reparto
        </button>
    </main>

    <!-- Tab 3: Historial Cerradas -->
    <main class="tab-content" id="tab-historial">
        <div class="entregas-container" id="historial-container">
            <div class="loading-screen">
                <div class="spinner"></div>
                <p>Cargando historial...</p>
            </div>
        </div>
    </main>

    <!-- BOTTOM NAVIGATION -->
    <nav class="bottom-nav">
        <a href="#" class="nav-item" id="nav-pendientes" onclick="switchTab('pendientes')">
            <span class="nav-icon">📋</span>
            <span class="nav-label">Pendientes</span>
        </a>
        <a href="#" class="nav-item active" id="nav-ruta" onclick="switchTab('ruta')">
            <span class="nav-icon">🚚</span>
            <span class="nav-label">Mi Ruta</span>
        </a>
        <a href="#" class="nav-item" id="nav-historial" onclick="switchTab('historial')">
            <span class="nav-icon">🕒</span>
            <span class="nav-label">Historial</span>
        </a>
    </nav>

    <!-- Modal de Confirmación de Entrega -->
    <div id="modal-confirmar-entrega" class="modal-mobile" style="display: none;">
        <div class="modal-content-mobile">
            <div class="modal-header-mobile">
                <h2>Confirmar Entrega</h2>
                <button class="modal-close-mobile" onclick="cerrarModalEntrega()">&times;</button>
            </div>
            <div class="modal-body-mobile">
                <p>Funcionalidad de confirmación de entrega en desarrollo...</p>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/mobile.js"></script>
    <script src="js/controllers/PendientesUI.js"></script>
    <script src="js/controllers/RutaActivaUI.js"></script>
    <script src="js/controllers/HistorialUI.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            if (verificarSesion()) {
                // Iniciar Tab por defecto
                iniciarDashboard();
            }
        });
    </script>
</body>
</html>
