<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Artículos - Gestiones Lamda</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .page-title {
            margin-bottom: 30px;
            color: var(--text-color);
            text-align: center;
        }

        .content-section {
            background-color: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
            margin: 20px 0;
        }

        .tabla-articulos {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        .tabla-articulos th,
        .tabla-articulos td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ddd;
        }

        .tabla-articulos th {
            background-color: #f8f9fa;
            font-weight: 600;
            color: var(--text-color);
        }

        .tabla-articulos tr:hover {
            background-color: #f5f5f5;
        }

        .mensaje-error {
            background-color: #dc3545;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }

        .mensaje-exito {
            background-color: #28a745;
            color: white;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 20px;
            text-align: center;
        }

        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Gestión de Artículos</h1>
            <a href="/pages/produccion.html" class="back-button">← Volver al espacio de trabajo</a>
        </header>

        <main>
            <div class="content-section">
                <h2 class="page-title">Lista de Artículos</h2>
                <table class="tabla-articulos">
                    <thead>
                        <tr>
                            <th>Número</th>
                            <th>Nombre</th>
                            <th>Código de Barras</th>
                            <th>Stock Ventas</th>
                        </tr>
                    </thead>
                    <tbody id="tabla-articulos-body">
                        <!-- Los artículos se cargarán dinámicamente aquí -->
                    </tbody>
                </table>
            </div>
        </main>

        <footer>
            <p>&copy; 2024 Gestiones Lamda</p>
        </footer>
    </div>

    <script type="module" src="/js/articulos.js"></script>
</body>
</html>
