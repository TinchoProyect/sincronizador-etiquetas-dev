<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inventario Móvil</title>
    <!-- Estilo unificado -->
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/inventario-movil.css">

    <!-- Librerías -->
    <script src="https://unpkg.com/@zxing/library@latest/umd/index.min.js"></script>
    <script src="/socket.io/socket.io.js"></script>
</head>

<body class="mobile-layout">

    <!-- NAVBAR SUPERIOR -->
    <nav class="navbar">
        <div class="nav-brand">
            📱 Inv. <span id="info-sectores" class="sector-badge">...</span>
        </div>
        <div class="nav-actions">
            <button id="btn-cancelar-global" class="btn-icon-danger" title="Cancelar Inventario">⛔</button>
        </div>
    </nav>

    <!-- TABS DE NAVEGACION -->
    <div class="tabs-header">
        <button class="tab-link active" data-tab="carga">📥 Carga</button>
        <button class="tab-link" data-tab="pendientes">⏳ Pendientes (<span id="badge-pendientes">0</span>)</button>
        <button class="tab-link" data-tab="contados">✅ Contados (<span id="badge-contados">0</span>)</button>
    </div>

    <div class="mobile-container with-tabs">

        <!-- Estado de Conexión -->
        <div id="sin-inventario" class="status-message error" style="display: block;">
            <p>Conectando...</p>
        </div>

        <!-- CONTENIDO TABS -->

        <!-- 1. TAB CARGA -->
        <div id="tab-carga" class="tab-content active">

            <!-- ACCIONES RAPIDAS SECTOR -->
            <div class="sector-actions-row">
                <button id="btn-print-sector-movil" class="btn-secondary-small">🖨️ Imprimir Sector</button>
            </div>

            <!-- INPUT PRINCIPAL (SCANNER/SEARCH) -->
            <div class="input-group main-search-group">
                <input type="text" id="buscador-movil" class="main-input" placeholder="Escanear o Buscar..."
                    autocomplete="off">
                <button id="btn-camera-toggle" class="btn-icon-small">📷</button>

                <!-- DROPDOWN SUGERENCIAS -->
                <div id="search-dropdown" class="dropdown-list" style="display:none"></div>
            </div>

            <!-- TARJETA DE PRODUCTO ACTIVO -->
            <div id="info-articulo" class="product-card fade-in" style="display: none;">
                <div class="card-header">
                    <div style="flex: 1">
                        <h3 id="nombre-articulo" class="product-name">Nombre del Producto</h3>
                        <div class="product-meta-row">
                            <small id="codigo-articulo" class="text-muted">COD: --</small>
                            <small id="stock-sistema-badge" class="badge-neutral">Sys: 0</small>
                        </div>
                    </div>
                    <!-- Botón Imprimir -->
                    <button id="btn-imprimir" class="btn-action-icon" title="Imprimir Etiqueta">🖨️</button>
                </div>

                <div class="card-body">
                    <!-- Diferencia Visual -->
                    <div id="diff-bar" class="diff-bar neutral">
                        <span id="diff-text">Diferencia: 0</span>
                    </div>

                    <!-- Input Cantidad -->
                    <div class="input-row centered-row">
                        <!-- FIX: type="text" para permitir coma libremente en Android -->
                        <input type="text" id="cantidad" class="qty-input" placeholder="0.00" inputmode="decimal"
                            autocomplete="off">
                        <span class="unit-label">kg</span>
                    </div>
                </div>
                <!-- Confirmar en tarjeta -->
                <div class="card-actions">
                    <button id="btn-cargar" class="btn-primary-block" disabled>CONFIRMAR PESO</button>
                </div>
            </div>

            <div class="empty-state-placeholder" id="placeholder-carga">
                <p>Escanea un producto o selecciona de "Pendientes"</p>
            </div>
        </div>

        <!-- 2. TAB PENDIENTES -->
        <div id="tab-pendientes" class="tab-content">
            <div class="list-header-sticky">
                <input type="text" id="filtro-pendientes" placeholder="Filtrar pendientes..." class="mini-input">
            </div>
            <div id="lista-pendientes-container" class="items-list">
                <!-- Items pendiente -->
            </div>
        </div>

        <!-- 3. TAB CONTADOS -->
        <div id="tab-contados" class="tab-content">
            <div id="lista-contados-container" class="items-list">
                <!-- Items contados -->
            </div>
        </div>


        <!-- MODAL CAMARA -->
        <div id="modal-scanner" class="camera-modal" style="display: none;">
            <div class="camera-container">
                <div id="reader" style="width: 100%"></div>
                <button id="btn-cerrar-scanner" class="btn-pill-overlay">Cerrar Cámara</button>
            </div>
        </div>

        <!-- MODAL IMPRIMIR SECTORES -->
        <div id="modal-imprimir-sectores" class="modal-overlay"
            style="display: none; align-items: flex-start; padding-top: 50px;">
            <div class="modal-card" style="width: 90%; max-height: 80vh; display: flex; flex-direction: column;">
                <h3>🖨️ Imprimir Sectores</h3>
                <div style="flex: 1; overflow-y: auto; text-align: left; margin-bottom: 15px; border: 1px solid #eee; padding: 10px; border-radius: 8px;"
                    id="lista-sectores-movil">
                    <!-- Checkboxes -->
                </div>
                <div class="action-row">
                    <button id="btn-cancelar-print-movil" class="btn-secondary">Cancelar</button>
                    <button id="btn-confirmar-print-movil" class="btn-primary">🖨️ Imprimir</button>
                </div>
            </div>
        </div>

        <!-- MODAL RESUMEN CIERRE (Cierre solo desde PC, pero avisamos) -->
        <!-- TOAST -->
        <div id="confirmacion" class="toast-message" style="display: none;">✅ Guardado</div>

    </div>

    <script type="module" src="/js/inventarioMovil.js?v=6.0"></script>
</body>

</html>
